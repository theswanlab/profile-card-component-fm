<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
    <title>Profile Card</title>
</head>
<body>
    <div class="card-container">
        <img src="images/bg-pattern-card.svg" alt="">
        <img class="sara-img" src="images/image-sara.jpg" alt="">
      <div class="sara-info">
        <h3>Sara Ali</h3>
        <span>23</span>
      </div>
      <p class="location">Baghdad</p>
      <hr>
      <div class="social-info">
        <div class="spacing">
            <p class="number">80K</p>
            <p class="name">Followers</p>
        </div>
        <div class="spacing">
            <p class="number">803K</p>
            <p class="name">Likes</p>
        </div>
        <div class="spacing">
            <p class="number">1.4K</p>
            <p class="name">Photos</p>
        </div>
      </div>
    </div>
</body>
</html>
